name: CI

# Gate de calidad para los DOS caminos a producción que parten de main:
#   1. Hosting web — `npm run deploy` manual desde main (no pasa por tags).
#   2. Desktop/Android — tags `v*` que dispara release.yml.
# Por eso el trigger es main (push + PR), no tags: cubre ambos caminos.
# release.yml solo buildea/firma artefactos nativos; NO corre lint ni tests.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela runs viejos del mismo ref si llega un push nuevo (ahorra minutos).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # --legacy-peer-deps: mismo flag que release.yml — el árbol de deps tiene
      # conflictos de peer que npm 7+ rechaza en modo estricto.
      - name: Install deps
        run: npm ci --legacy-peer-deps

      # src/functions es un proyecto npm independiente (su propio package-lock). Los unit
      # tests de functions (que corren en `npm test`) importan firebase-functions, y el
      # build de functions (test:functions) usa su toolchain. El `npm ci` de arriba NO
      # instala estas deps → sin esto, `npm test` falla con ERR_MODULE_NOT_FOUND. Bug de
      # CI preexistente (el job venía rojo) que el harness destapa y necesita resuelto.
      - name: Install functions deps
        working-directory: src/functions
        run: npm ci --legacy-peer-deps

      # eslint . incluye el guard no-restricted-syntax (mutaciones TinyBase en
      # hooks) + no-restricted-imports (Clean Arch capa 2). No auto-fix: falla
      # el job si hay cualquier violación.
      - name: Lint
        run: npm run lint

      # `tsc -b` sigue las project references del root (tsconfig.app.json + tsconfig.node.json)
      # → type-checkea src/ DE VERDAD. El `npx tsc --noEmit` anterior NO seguía references
      # (root con `files: []` → chequeaba 0 archivos = no-op silencioso, falso-verde). D9.
      - name: Type-check
        run: npx tsc -b

      # SPEC-55 — el harness e2e/ NO está en las references del root → el `tsc -b` de arriba
      # no lo cubre. Gate de tipos dedicado del harness (tsconfig.e2e.json standalone).
      - name: Type-check e2e harness
        run: npm run typecheck:e2e

      # vitest detecta CI=true (lo setea GitHub Actions) y corre una sola vez,
      # sin watch mode. Cubre los tests unit (repos, tinybase, saveQueue, etc).
      - name: Test
        run: npm test

      # JDK para el Firebase Emulator Suite (Firestore/Auth lo requieren). Compartido por
      # el gate de rules (test:rules, D8) y el E2E de callables (test:functions, SPEC-55).
      - name: Setup Java (Firebase emulators)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}

      # D8 — gate de las security rules (allowlist/accessRequests deny-all + backstop de
      # revoke) contra el emulador de Firestore. Hasta ahora corría solo local; las rules
      # son el borde de seguridad de la beta y no tenían gate automático en CI.
      - name: Rules tests (emulator)
        run: npm run test:rules

      # SPEC-55 — E2E de las 5 callables de access contra el emulador
      # (functions+auth+firestore). Genera .secret.local en runtime, compila functions
      # y corre la suite secuencial (fileParallelism: false).
      - name: E2E callables (emulator)
        run: npm run test:functions
